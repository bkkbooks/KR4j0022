body:
  text: 筠溪樂府宋李彌遜撰沁園春寄張仲宗蘆川集誤刋攲枕深軒散帙虛堂畏景屢移漸披襟臨水榰牀就月蓮香拂面竹色侵衣壓玉為醪折荷當盞卧看銀橫星四垂人歸後伴飢蟬自語宿鳥相依癡兒莫蹈危機悟四十九年都盡非任紆朱拖紫圍金珮玉青錢流地白璧如坁富貴浮雲身名零露事事無心歸便歸秋風動正吳淞月冷蓴長鱸肥永遇樂初夏獨坐西山釣臺新亭曲徑通幽小亭依翠春事才過看笋成竿等花著果永晝供閒坐蒼蒼晚色臨淵小立恰引暮鷗飛墮悄無人一溪山影可惜被渠分破百年似夢一身如寄南北去留皆可我自知魚翛然濠上不問魚非我隔籬呼取舉杯對影有唱更憑誰和知淵明清流臨賦似得恁麼其二用前韻呈張仲宗蘇粹中五十勞生紫髯霜換白日駒過閉户推愁緣崖避俗壁角團蒲坐提壺人至竹根同卧醉帽儘從攲墮夢驚回滿身疏影露滴月斜雲破無人自酌有邀皆去我笑兩翁多可忍凍吟詩典衣沽酒二子應嗤我兩忘一笑調同今古誰道郢歌無和後之人猶今視昔有能繼麼念奴嬌瑤池倒影露華濃羣玉峯巒如洗明鏡平鋪秋水淨寒鎖一天空翠荷芰風搖蘋蘩波動驚起魚龍戲扶疏桂影十分光照人世誰似老子癡頑胡牀危坐自引壺觴醉斗轉參橫歌未徹屋角烏飛星墜對影三人停杯一問誰㑹騎鯨意金牛何處玉樓髙聳十二其二坐上次王伯開韻風簾弄影正閒堂永晝香銷人寂軋軋鄰機芳思亂愁入回文新織燕蹴巢泥鶯喧庭栁好夢無蹤跡那堪春事背人何計留得誰似愛酒南鄰岸巾坦腹醉踏西山碧綵筆陽春傳雁足催我飛觴浮白老去情懷憑君試看鬢上秋霜色故園千里月華空照相憶其三癸卯老親生辰寄武昌楚山木落際平蕪千里寒霜凝碧鄂渚波橫何處是當日孫郎赤壁黃耳音稀白雲望逺又見春消息嘉辰長記謝池梅蕊初摘遙想黃鶴樓髙蘭階絲管沸傳觴如織倦客心馳歸路繞不及南飛雙翼因著斑衣重翻錦字寄逺供新拍明年歡侍夀期應獻千百三段子次韻蘇粹中寄詠筠莊層林烟霽巨壁天半鴻飛無路雲斷處兩山之間十萬琅玕環翠羽轉繡谷枕蘋花汀溆短栁疏籬向暮看卧壟牛歸橫舟人去平蕪鷗鷺並逰不見鞭鸞侣只僧前松子隨步回徑險凌風遐想小憩清泉欹茂樹正筍蕨過如酥新雨磯下逰魚可數縱窈窕雪關常啓寂寂誰爭子所世上丹轂朱纓春夢覺南柯何許况榮枯無定中有歡離愁緒儘笑我詫盤中趣為續昌黎賦㑹有人秣馬膏車相屬一樽清醑水調歌頭橫山閣對月清夜月當午軒户踏層氷樓髙百尺縹眇天闕敞雲扃萬里風搖玉樹吹我衣裾零亂寒入骨毛輕徑欲乘之去髙興繞青冥神仙說功名事兩難成葦汀筠岫深處端可寄餘齡身外營營姑置對景掀髯一笑引手接飛螢且盡杯中物日出事還生其二次李伯紀韻趣開東閣安石寓絲竹方朔雜詼諧昻霄氣概古來無地可容才不見騎鯨仙伯唾手功名事了猿鶴與同儕有意謝軒冕無計避嫌猜靜中樂山照座月浮杯忘形湛輩一笑丘壑寫髙懷只恐天催玉斧為破烟塵昏翳人自日邉來東閣動詩興莫待北枝開其三次李伯紀春日韻松菊漸成趣紅紫忽齊開花神靳惜芳事日日待公來遙想金葵側處素月華燈相照糚影滿歌臺餘韻寫宫羽飛落逺山隈逃禪客尊中盡厭長齊且愁風絮斷送春色攪離懷命駕何妨千里祗恐行雲凝轍直磴岫崔嵬手拍陽春唱隔屋借殘杯其四次向伯恭薌林見寄韻不見隱君子一月比三秋驚濤如許夢魂無路絶橫流安得如雲長翮命駕不須千里上下逐君逰此計杳難就注目倚江樓西風裏多少恨寄歌頭飛奴接翼為我三度下南州三得伯恭佳詞正是天寒日暮獨釣一江殘雪風獵碧莎裘和子浩然句一醉散千憂其五再用前韻不下長安道霜鬢幾經秋故人何在時序欺我去如流常對洛濱仙伯共說薌林佳致魂夢與追逰更唱中秋句得月上東樓雲巖屋秋香下楚江頭十年笑傲真是騎鶴上揚州却憶金門聯轡曉殿催班同到髙拱翠雲裘明月今千里何計緩離憂其六八月十五夜集最樂堂月大明常嵗所無衆客皆歡戲用伯恭韻作白髮閩江上幾度過中秋隂晴相半曽見玉塔卧寒流不似今年三五皎皎氷輪初上天闕恍神逰下視人間世萬户水明樓賢公子追樂事占鼇頭酒酣喝月腰鼓百面打涼州沈醉儘扶紅袖不管風搖仙掌零露濕輕裘但恐尊中盡身外復何憂驀山溪次李伯紀梅花韻衝寒山意未放江頭樹老去恨春遲數花期朝朝暮暮疏英冷蕊也為有情忙深夜月小庭中絶勝西城路調元妙手便是春來處醖造十分香更暖借毫端烟雨狂歌醉客小摘問東風花謝後子成時趁得和羮否其二宣城丞㕔雙梅竹邉栁外兩兩寒梅樹疏影上簾櫳似却月一枝橫暮玉肌瘦損有恨不禁春縈氷珮整風裳悵望瑤臺路我來勝賞持酒花深處天曉釀幽香正一霎如酥小雨江山得助臭味許誰同長安逺故人疏夢到江南否昆明池次韻尚書兄春晚帳錦籠庭囊香飄榭過了芳時强半覔殘紅蜂鬚趂日占新緑鶯喉咤暖數花期望得春來去也把酒南山誰伴更簾幕垂垂惱人飛絮亂落一軒風晚手拍狂歌揮醉碗笑浪走江頭幾逢歸燕憶黃花曽吹紗帽訝綵樓催攽紈扇功名事於我如雲漫贏得星星滿簪霜換向棠棣華間鶺鴒原上莫厭樽罍頻見十月桃二首同富季申賦梅花浮雲無定任春風萬㸃吹上寒枝砌外瓏璁暗香夜襲簾幃閒情最宜酒伴勝黃昏冷月清溪風流謝傅夢到華胥長是相隨似凝愁不語誰知芳思亂微酸已帶離離傳語花神任教橫竹三吹枝頭要看如豆趂和羮百卉開時十分金蕊先與東君一笑相期其二一枝三四㺯疏英秀色特地生寒刻楮三年漫誇煮石成丹梨花帶雨難並似玉妃寂寞微澘瑤臺空濶露下星埀零亂風鬟記前回擁蓋西園花信被山烟著意邀䦨盞面橫斜大家月底頽然如今萬㸃難綴共蒼苔打合成斑詩翁何似勸春莫教粉斷香殘聲聲慢朩樨龍涎染就沉水薰成分明亂屑瓊瑰一朵才開人知十里須知花兒大則不大有許多瀟灑清奇較量盡誚勝如末利賽過酴醿更被秋光斷送微放些月照著陳風吹惱殺多情猛拚沈醉酬伊朝朝暮暮守定儘忙時也不分離睡夢裏膽瓶兒枕畔數枝永遇樂學士兄築室南山拒搜峯下與玉山相對因生日以詞見意一水如繩兩山如翼緑野如繡松院干霄筠莊枕浪攬盡溪山秀水南水北竹輿蘭棹來往月宵花晝問人間天上何處更尋大圍小有人言拒搜功成仙去丹鼎夜寒光透喚取雲英鍊成石髓日月齊長久煩君挾我朝元真闕兩翼羽輕風驟此時看小茅峯頂有雲貫斗滿庭芳中秋次劉夢弼韻荷背翻黃蕉心滴翠雨洗庭院無塵斷雲缺處矯首望氷輪迤邐天垂四幕星杓淡河漢橫銀笙歌散風簾自上寒水滿樓明劉郎方得計手搖繡户枕並華裀笑狂客無眼坐聽鐘鯨明月中秋一夢臨鴛甃三繞殷勤清光裏持杯對影風月兩兼并水龍吟上已化工收拾芳菲暈酥剪綵迎春禊江山影裏泰階星聚重尋古意曲水流觴晚林張宴竹邉花外倩飛英襯地繁枝障日遊絲駐羲和斾雲避清歌自止放一鈎玉沉寒水西園飛蓋東山攜妓古今無愧聞道東君商量花蕊作明年計待公歸獨運丹青妙手憶山隂醉洞仙歌登臨漳城詠梅斷橋斜路又是春來也仙掌挼雲半開謝儘凝酥砌粉不似真香分明對氷雪肌膚姑射天涯傷老大萬斛新愁一笑端須問花借縱廣平冷淡鐵石心腸未拚得花裏風前月下為傳語遊蜂緩經營且留與山翁醉吟清夜其二次李伯紀韻殘烟薄霧仗東風排遣收拾輕寒做輕暖問牆隅屋角多少青紅春不語行處隨人近逺穿簾花影亂金鴨香溫幽夢醒時午禽囀任拋書推枕嚼蕊攀條暗消了清愁一半且莫放浮雲蔽晴暉怕惹起羇人望中凝戀江神子臨安道中夢中北去又南來飽風埃鬢華衰浮木飛蓬蹤跡為誰催自笑自悲還自誤一杯酒鼻如雷曉輿行處覺春回屑瓊瑰糝莓苔病眼衝寒欲閉又還開近水人家籬落畔遙認得一枝梅感皇恩次韻尚書兄老山堂作入夜月華清中天方好更著山光兩相照星稀雲淨玉樹驚烏三繞廣寒風露近秋先老老山髙勝飛塵不到亭上仙翁自昏曉短詞新唱字字令人絶倒待憑書寄恨歸鴻少花心動七夕水館風亭晚香濃一畨芰荷經雨簟枕乍閒襟裾初試散盡滿軒袢暑斷雲却送輕雷去疏林外玉鈎微吐夜未䦨秋生敗葉暗催庭樹天上佳期久阻星河畔仙車縹眇雲路舊恨未平幽歡難駐灑落半天風露綺羅人散金猊冷醉魂到華胥深處洞戶悄南樓畫角自語一寸金尚書生日光州作光州芍藥甚盛尚書為品次圖之故末句云仙李盤根自有雲仍藹芳裔笑溜雨霜皮臨風玉樹紫髯丹頰長生久視鶴帳琅書至長庚夢當年暗記佳辰近回首西風漸喜秋英弄霜蕊暫捲雙旌鳴金吹祝萱堂伴新戲對璧月留光屏仙供翠碧雲人合飛觴如綴早晚巖廊侍終不負黃樓一醉丹青手先與翻階萬葉增春媚蝶戀花擬古百尺遊絲當繡戶不繫春暉只繫閒愁住拾翠歸來芳草路避人蝴蝶雙飛去困臉羞眉無意緒陌上行人記得清明否消息未來池閣暮濛濛一餉梨花雨其二逰南山過陳公立後亭作足力窮時山已晦却上輕舟急棹穿沙背雲影漸隨風力退一川月白寒光碎喚客主人陶謝輩拂石移尊不管逰人醉羅綺叢中無此㑹只疑身在烟霞外其三新晴用前韻清曉天容爭顯晦溪上羣山戢戢分駝背誰似浮雲知進退疏林嫩日黃金碎夜枕不眠憎鼠輩困眼貪晴拌被風烟醉天意有情人不㑹分明置我風波外其四福州橫山閣百疊青山江一縷十里人家路繞南臺去榕葉滿川飛白鷺疏簾半捲黃昏雨樓閣峥嶸天尺五荷芰風清習習消袢暑老子人間無著處一樽來作橫山主其五西山小湖四月蓮初有一花小小芙蕖紅半展占早爭先不耐腰支軟羅襪凌波嬌欲顫向人如訴閨中怨把酒與君成眷戀約束新荷四靣低歌扇不放逰人偷眼盼鴛鴦葉底潜窺見虞美人詠古上陽遲日千門鎖花外流鶯過一番春去又經秋惟有深宫明月照人愁暗中白髮隨芳草却恨容顔好更無魂夢到昭陽腸斷一雙飛燕在雕梁其二東山海棠開後春誰主日日催花雨可憐新緑遍殘枝不見香腮和粉暈燕脂去年攜手聽金縷正是花飛處老來先自不禁愁這樣愁來欺老幾時休其三金泥捍撥春聲碎恨入相思淚醉攲秋水緑雲斜渾似夢中重到阿環家主人著意留春住不醉無歸去只愁銀燭曉生寒明日落花飛絮滿長安其四贈富季申别年年江上清秋節盞面分霜月不堪對月已傷離那更梅花開後海棠時劍溪難駐仙逰路直上雲霄去藕花恰莫礙行舟要趁潮頭八月到揚州其五次韻葉少藴懷隱菴作方壺小有人誰到底事春知早使君和氣粲成花更築百花深處駐春華雲關逺枕苕溪淺未放歸懷展看殘紅紫緑隂斜鸞鳳干霄却上玉皇家青玉案楊花儘做難拘管也解趂飛紅伴驄馬無情人漸逺沙平淺渡雨濕孤村何處長亭晚欲憑桃葉傳春怨算不似斜風倩雙燕縱得書來春又換只將心事分付眉尖寂寞梨花院菩薩蠻管邦惠家小鬟善謳小山嬌翠敧歌扇雛鶯學語春猶淺無力響方檀聲隨玉笋翻垂鬟雲乍染媚靨香微㸃未解作輕顰凝情已動人其二新秋凉飈輕散餘霞綺疏星冷浸眀河水攲枕畫簷風秋生草際蛩雁行離塞晚不道衡陽逺歸恨隔重山樓髙莫憑欄其三風庭瑟瑟燈明滅碧桐枝上蟬聲歇枕冷夢魂驚一階寒水明烏飛人未起月露清如洗無語聽殘更愁從兩鬢生其四富季申見約觀月以病不能往夜分獨卧橫山閣作此寄之餘霞收盡寒烟緑江山一片團明玉攲枕畫樓風愁生草際蛩金莖秋未老兩鬢吳霜早忍負廣寒期清尊却對誰浣溪沙小小茅茨隱翠微橋平雙手㺯漣漪好風還動去年枝得雨疏梅肥欲展人家次第有芳菲惜花恰莫探春遲其二和蔣丞端午競渡簫鼓哀吟樂楚臣牙檣錦纜簇江漘調髙綵筆逞尖新海角逢時傷老大莫辭巵酒話情親與君同是異鄉人其三向日南枝不奈晴無風絳雪自飄零畫樓更作斷腸聲小側金荷迎落蕊髙燒銀燭照殘英生愁斜月酒初醒臨江仙次韻尚書兄送别枝上子規催去斾栁條偏繫離情片雲留雨鎖愁城不堪明夜月寂寞照南榮莫作東山今日計風雷已促鵬程功成來伴赤松行却尋鴻雁侣尊酒㑹如星其二次韻富季申九月菊未開燕去鶯來昏又曉勞生莫負心期菊花何必待開時十分浮玉蟻一拍貫珠詞少借筆端烟雨力不須露染風披芳心微露定因誰風流今太傅瀟灑古東籬其三次李伯紀韻多病淵明剛止酒不禁秋蕊浮香飲船歌板已兼忘吳霜羞鬢改無語對紅糚小撚青枝撩鼻觀絶勝嬌額塗黃獨醒滋味怕新凉歸來燈影亂攲枕聽更長其四杏花一片花飛春已減那堪萬㸃愁人可能春便負閒身細思愁不飲却是自辜春且共一樽追落蕊猶勝陌上成塵杯行到手莫辭頻杏花須記取曽與此翁鄰其五次韻葉少藴惜春試問花枝餘幾許捲簾細雨隨人風光猶戀苦吟身海棠渾怯冷為我強留春細聽惜花歌白雪不知盞面生塵吹開吹謝漫驚頻少陵真有味愛酒覔南鄰醉花隂翠箔隂隂籠畫閣昨夜東風惡香徑漫春泥南北東郊惆悵妨行樂傷春比似年時覺潘鬢新來薄何處不禁愁雨滴花腮和淚胭脂落其二木樨紫菊紅萸開遜早獨占秋光老醖造一般清比著芝蘭猶自爭多少霜刀剪葉呈纎巧手撚迎人笑雲鬢一枝斜小閣幽忩是處都香了清平樂登第燭花催曉醉玉頽春酒一騎東風消息到占得鼇頭龍首長安去路駸駸明朝躍馬芳隂應是花繁鶯巧東君著意瓊林其二春晚一簾紅雨飄蕩誰家去門外垂楊千萬縷不把東風留住舊巢燕子來遲故園緑暗殘枝腸斷畫橋烟水此情不許春知浪淘沙林仲和送芍藥再以詞為寄次韻謝之把酒挽芳時醉袖淋漓多情楚客為秋悲未抵香飄紅褪也獨繞空枝天女寶刀遲露染風披翠雲疊疊擁銖衣知道筠溪春寂寞來慰相思其二連鵬舉座上次康平仲留别韻樂事信難逢莫放匆匆飛紅撩亂減春容臨水不禁頻送客風袖龍鍾小閣畫堂東綺繡相重樽前誰唱夏雲峰醒後欲尋溪上路烟水無窮是日歌姬首唱夏雲峯謁金門寄逺春又老愁似落花難掃一醉一回才忘了醒來還滿抱此恨欲憑誰道栁外數聲啼鳥只恐春風吹不到斷雲連碧草滴滴金次韻尚書兄老山堂雪廣平未拌心如鐡恨梅花隔年别化工剪水鬭春風似南枝和月長鯨一飲寧論石想髙歌醉瑶席幾時歸去共樽罍看寒花連陌訴衷情次韻李伯紀桃花小桃初破兩三花深淺散餘霞東君也解人意次第到山家臨水岸一枝斜照籠紗可憐何事苦愛施朱減盡容華好事近同前春苑雜花芳詩老賸誇梅格誰道武陵深處便不如姑射莫分紅淺與紅深㸃㸃是春色生怕一畨風雨伴飄零江國鶴冲天張仲宗以秋香酒見寄并詞次其韻篘玉液釀花光來趂此忩凉為君小摘蜀葵黃一似嗅枝香飲中仙山中相也道十分宫樣一般時候最宜嘗竹院月侵牀天仙子次富季申韻飛蓋追春春約佇繁杏枝頭紅未雨小樓翠幕不禁風芳草路無塵處明月滿庭人欲去一醉鄰翁須記取見說新糚桃葉女明年却對此花時留不住花前語總向似花人付與清平樂次韻葉少藴和程進道梅花斷橋缺月㸃㸃枝頭雪畫角吹殘聲未歇早是一年春别夀陽㺯粉成糚柔腸結結丁香可怕真梅輕妬遊蜂說與何妨其二推愁何計車下忘乘墜日上南枝春有意已訝紅酥如綴兒童緩整餘杯芒鞋午夜重來素面應憎月冷真香不逐風回其三長紅小白何處尋梅格日日南山雲滿額暗老一分春色廣平賦罷瑤香細花疏蕊商量留得筆端雨露後來收拾羣芳二月始得此詞故于末章見意㸃絳唇奉酬富季申剪剪疏花託根宛在長松底蔓柯相倚便有凌霄志丹鳳忽來小隊迎秋起留無計待公歸侍重與分紅翠虞美人宜人生日梨花院落溶溶雨弱栁低金縷畫簷風露為誰明青翼來時試問董雙成去年春酒為眉夀花影浮金斗不須更覔老人星但願一年一上一千齡醉花隂學士生日池面芙蕖紅散綺鵲噪朱門喜環佩響天風香藹杯盤更約麻姑侍塵寰不隔蓬萊水束帶巖廊戲瘦鶴與長松且伴臞仙久住人間世其二碩人生日簾捲西風輕雨外揖數峯橫翠樓上地行仙壓玉為醪旋摘黃金蕊一觴一闋千秋嵗不願封侯貴長伴紫髯翁踏月吹簫笑詠雲山裏感皇恩學士生日花院小回廊庭萱成行水面紅糚翠綃帳蓬萊雲近風露一畨清曠星郎來碧落長庚象素志未酬丹心益壯且醉真珠小槽釀不須晧齒手拍狂歌清唱一尊為夀逺羲皇上其二端禮節使生日密竹剪輕綃華堂初建捲上蝦鬚待開宴夀期春聚芍藥一畨開遍砌成錦步帳籠絃管絳節近頒丹雛重見花裏雙雙乍歸燕重重樂事憑仗東風拘管一時分付與金荷勸小重山學士生日鞭鳳驂鸞自斗杓老君親抱送下層霄人間仙李占春饒千秋裏松月伴吹簫故國水雲遙摘新丹荔熟剝紅綃南山影轉卧金蕉傾寒緑眉夀比山髙其二同前星斗心胸錦繡腸厭隨塵土客逐炎凉江山風月伴行藏無人識髙卧水雲鄉肘後有仙方假饒丹未就夀須長儒冠多誤莫思量十分酒菡萏小池塘花心動夫人生日紅日當樓繡屏開風裀舞花隨步絳拂珮蘭香染糚梅倣佛紫烟真侶雪消池館年年㑹玻璃泛小槽新注弄簫語雲璈未徹暖回芳樹瑤檢曽頒夀縷好繫日縈春馭鸞深駐桂殿影寒蓬山波濶未似綵衣庭户坐看鶴鬢呈萊戲重重拜天階雨露縱遊處人間遍尋洞府漁家傲博士生日海角秋髙風力驟樓臺四面山容瘦季子貂裘寒欲透懸弧晝髙歌棣萼聊巵酒且共追歡寬白首清閒贏得身長久世上功名翻覆手為君夀腰間要看懸金斗阮郎歸碩人生日黃花猶未拆霜枝今年秋較遲六么催泛玉東西登髙慶誕時神仙事古來稀且為千嵗期戲萊堂上兩龎眉何妨舉案齊醉落托碩人生日霜林變緑畫簾桂子排香粟一聲檀板驚飛鶩絃管樓髙誰在䦨干曲人生一笑難相屬滿堂何必堆金玉但求身健兒孫福鶴髮年年同泛清尊菊栁梢青趙端禮生日夀烟籠席採蓮新按舞腰無力占盡風光人間天上今夕何夕藍袍換了萊衣慶嵗嵗君恩屢錫連夜歡聲滿城佳氣和春留得㸃絳唇富季申生日花信爭先暗將春意傳桃李夀鄉同醉緑野聨珠履麟閣丹青眷注耆英裔眉間喜日邉飛騎來促東山起十樣花陌上風光濃處第一寒梅先吐待得春來也香銷減態凝竚百花休漫妬陌上風光濃處繁杏枝頭春聚艷態最嬌嬈最比並東鄰女紅梅何足數陌上風光濃處日暖山櫻紅露結子㸃朱脣花謝後君看取流鶯偏祝付陌上風光濃處忘却桃源歸路洞口水流遲香風動紅無數吹愁何處去陌上風光濃處最是海棠風措翠袖襯輕紅盈盈淚怨春去黃昏微帶雨陌上風光濃處自有花王為主富艷壓羣芳蜂蝶戲燕鶯語東君都付與陌上風光濃處紅藥一畨經雨把酒繞芳叢花解語勸春住莫教容易去筠溪樂府
