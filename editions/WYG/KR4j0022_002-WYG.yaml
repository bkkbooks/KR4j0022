front:
  text: 筠谿家傳公諱彌遜字似之其先本唐諸王苗裔始家陳留八代祖澄仕為温州永嘉令遂遷於閩居福州連江縣至大父為平江府吳縣人公晚年復歸隠於連江曽祖餘慶仕至國子博士知常州贈屯田郎中祖處常仕至忠武軍節度推官贈朝請大夫考撰仕至左朝奉大夫通判保州贈少師國博府君為政精明所至能以仁愛得人心論事切直不果用於朝出為常州殁官邦人思慕出涕留葬横山為之繪像嵗時奉祭不忘民有疾者取塋土服之輙愈其遺行詳見荆國王文公安石墓表及循吏遺愛録朝請府君年十三能兼通孔頴逹疏杜預左氏傳居官嚴整母公安太君得目疾不能視君晨夕為䑛其目以篤孝稱少師府君蚤從南豐先生曽鞏學南豐雅器重之初仕越州清獻趙公抃知其剛介薦聞於朝所至興崇學政人比之文翁常衮廣孟子説著養氣論傳於世龜山楊先生時實銘其墓公弱冠擢上舎冠多士崇寧以來方用舎法更貢舉視南省第一人登大觀三年進士第歴單州司户丁少師府君憂除䘮調鄆州陽榖簿政和四年二月除國朝會要所檢閲文字十二月引見上殿改授承奉郎遷秘書省校書郎充編修六典檢閲文字六年七月出為提舉河東路學事未赴九月授尚書禮部員外郎七年正月守尚書司封員外郎十一月試明堂頒事八年四月擢為起居郎時姦黨用事以上封事剴切八月貶知雅州廬山縣九月改奉嵩山祠斥廢隠居者凡八年宣和七年十二月知冀州敵騎初南牧河朔諸郡皆無備禦公在冀州捐金帛致勇士修城堞决河䕶塹邀擊敵之逰騎斬首甚衆敵入中國無有拒其鋒者惟冀能以死守烏珠北還戒師無犯其城敵還靖康元年七月召為衛尉少卿有㫖冀州守禦有勞進秩二等九月以論奏有忤與郡十一月差知筠州靖康二年江寧牙校周徳叛執帥臣資政殿學士宇文粹中殺官吏嬰城自守勢甚猖獗四月准大元帥府劄子除公江東路轉運判官就領郡事公時避兵蔣山無寸兵尺鐡聞命单騎扣賊圍蠟書射城中招降賊通欵開闗迎公公立馬喻賊禍福勉其舎逆從順赴在所勤王公夜卧黄堂大啟城門示賊不疑招集流亡賊之脅從悉從拊定其首亂者反側未服時新除右僕射李公綱行次江寧公與謀之呼首惡者五十人至庭下訊驗其狀一夕悉誅之其餘黨千餘人令提舉常平使者王枋部送行在一部按堵帖然建炎元年六月除職改充淮南路轉運副使訓詞褒諭謂迺者鋒刃餘孽怙惡不悛爾能奮然為民芟刈使朝廷威令稍伸可謂竒偉七月遭魯國太夫人艱解官建炎四年服除四月奉太平觀祠紹興二年三月祠滿知饒州三年三月丐崇道觀祠五年召對便殿首言當堅定規橅排斥姦言浮議責左右輔弼之臣為社稷經逺之慮又謂朝廷一日無事幸一日之安一月無事幸一月之安欲求終嵗之安已不可得况能定天下大計乎上嘉其讜直明日上具以所奏諭近臣有不樂者擬進職冄除郡進寳文閣知吉州陛辭上曰始将留卿大臣欲重試卿民事其為朕善拊循行召卿矣既至郡綏撫疲氓耡治盜賊境内稱治七年五月召為尚書左司員外郎八月除起居郎公自政和来為柱史以直節盡言流落中外閲二十年復居是職直前論事鯁切如初九月試中書舎人時國家多事公立朝知無不言奏疏滿箧乞令内外職事官皆得極言時事以開言路乞増置宿衛親兵以彊主勢乞罷諸路創立軍興月樁錢以寛民力至扵乗輿舉動亦密有規諌上嘗批奏疏曰李某可謂忠於愛君上又宣諭令條陳今日當行事件公奏對六事一曰固藩維以禦外侮二曰嚴禁衛以尊朝廷三曰練四方之兵以壯國勢四曰節國用以備軍食五曰收民心以固根本六曰擇守帥以責實效時駐蹕未定有㫖料舟給卒以濟宫人公封詔繳奏以為六飛雷動百司豫嚴方時孔艱宜以宗社為心不宜以内幸細故更勤聖慮事雖至微懼傷大體上嘉納之公在詞掖凡朝廷除授有私意封駁無所避當國者以為異已方國計單匱版省闕官無肯為者時宰謂公有心計可為民曹八年二月試户部侍郎三月公言祖宗之法有可行於今日發運一司是也大概權六路豐凶以行平糴之法然今比昔少異當師其意損益行之臣謂宜復此司别給糴本數百萬緡俾廣儲積以待恢復之用數年必見其效上詔從之遂復置江淮荆浙閩廣經制發運司以徽猷閣待制程公邁為之時秦檜再相惟公與吏部侍郎晏公敦復有憂色八月公上疏丐外甚力詔不允趙公鼎罷相檜專國賛上決策求和金國遣烏陵阿思謀等來議和使人入界索禮甚悖號其書曰詔書指吾國曰江南見吾館伴使必欲坐堂中而坐使人於一隅所歴州縣必欲使官吏具禮迎其書如國中迎天子詔書之禮且言國書到必欲上冄拜親受之又欲以客禮到都堂見宰執二使既到以難從之事邀請於朝欲上受金國封册中外惶駭三衙楊沂中等至都堂白宰執云聞朝廷欲賛主上行屈已之禮恐軍民詾詾即某輩弹壓不得是時敵使在館軍民皆出不平之語臣下惴惴慮生意外之變傾都城百姓終夕不能寐而近甸常潤會稽之間民並不安檜本主此議以人言紛紛亦於榻前求去要上決意求和時樞密院編修官胡公銓上言議和之非乞斬檜以謝天下校書郎范公如圭以書責檜曲學倍師忘仇辱國之罪遺臭萬世禮部侍郎曽公開至堂抗聲引古誼以折檜皆相繼貶逐方檜兇焰熏灼人莫敢言獨公對言金人遣使請和事當緩而圗之謀以致之必於有成至於先事致屈欲行君臣之禮有大不可者上深悟其説以為當然十一月詔廷臣大議公手疏敷陳甚切謂陛下受敵之空言未有一毫之得乃欲輕祖宗之所付託屈身委命自同下國而尊奉之是倒持太阿以授之柄授人以柄危國之道而謂之和可乎又曰陛下今率國人以臣事敵國将何以責天下忠臣義士之氣時羣臣心知臣事金人之非畏檜不敢辯爭皆同聲依阿其抗論不屈者唯公一二人而已檜忽遣介通殷勤邀公至私第曰政府方虛員茍和好無異議當以兩地相凂公答曰某受國恩深厚何敢見利忘義顧今日之事國人有不以為然者獨有一去可報相公檜默然不言次日公再上疏曰竊聞朝廷計議禮儀未定使人之説多不可從臣反覆思之敵人隂謀吞噬欲成混一之名故以土地宗族邀陛下金人敵國也卿士大夫國人所賴以為國者也今事未一得而先致屈坐失四海之心不可不慮臣自草萊屢被親擢思所以報陛下者唯盡忠而已茍顧避不言致陛下墮敵人之計失國人之心以貽後患臣之罪大矣又上疏言送伴使揣摩迎合意為身謀不恤社稷之計乞别選忠信之人協濟國事檜怒甚公復引疾請外上特諭大臣留之御筆有曰卿毋以輕去朕為髙檜盡排羣論屈禮從和之議已决附㑹其説者或謂往年金人南騖趙公鼎為臺臣尚欲畫江為界今乃以和議為非或謂向使在明州時主上雖百拜亦不問士論靡然無所規正賴公等廷爭檜雖不從亦知公議之可憚是以牽制再與使人計議稍殺其禮如不受封册如宰執就館見使人受護書納入免於主上屈體如改江南為宋改詔諭使名為國信若此類者初檜不以從之為恥皆公等忠憤激切立論正救之力惟君臣之禮迄不能爭九年春公凡再上疏懇歸田里以徽猷閣直學士知筠州改知漳州公不鄙逺郡修崇儒化新作鄉校至今鄉人繪祠於學十年請祠歸隠連江西山牓其别業曰筠莊自號筠谿真隠時權臣誅逐異已者忠臣賢士相望落南公日戒家人治裝束儋以俟嶺外之命五月金人烏珠渝盟舉國中之兵分四道深入十一年正月烏珠復簽兩河軍與蕃部凡十餘萬攻淮西陷夀春人益信公廷爭去國所論敵情反覆其言皆驗初檜主和諱戰排斥公等所奏至是檜乃言於上曰徳無常師主善為師臣昨見金國達蘭有割地之議故賛於從和今烏珠和議已變當定攘伐之計檜亦自知前言之非而自遷其説至十二年乗敵兵之敗諸將之勝檜復收兵求和何鑄曹勛使命既通檜乃追仇向者盡言之臣十一月言者論在宰執則趙鼎王庶在侍從則曽開李某是四人者同心併力或因求對或緣上章必欲力沮和議於是公與曽公開並落職公處之裕如初無幾微忿懟之意晚嵗著詩有曰十年去國心常赤可見公惓惓憂國之志公去國十五年不通時宰書不請磨勘不丐任子不序封爵終其身焉二十三年二月三日公終於寓居蕭寺先檜兩年殁三十一年朝廷知公忠節詔追復敷文閣待制其制詞云人臣守堅正之論陳於王前朝廷有優渥之恩公於身後公學問純正操行端方為人衎易與人無忤處大事臨大節不為利回威惕凛然有不可犯之色居官㢘而家益貧無一畞之田無一金之産獨藏書萬餘巻而已公立朝有直節而所典州皆有惠政公之為廬陵忠簡胡公銓嘗作郡齋記謂公威令神行惠利川流是豈巧言令色四體若無骨者所能乎公之治臨漳考亭先生朱公熹後至為郡為文祭公曰紹興之初公在邇列力闢和議見忌權臣出守此邦治行亦著竟以讒回去郡卧家人懐其忠建此遺烈又奠公於學曰惟此廟學實公所遷人到于今追頌勞績矧惟忠慮抑壯前聞二邦之政人皆能誦之公取友必端與人交必忠必信初胡忠簡之貶也人雖髙其節皆憚權臣莫敢與通公獨至其家為之經紀其行且書十事以贈言曰有天命有君命不擇地而安之曰唯君子困而不失其所亨曰名節之士猶未及道更宜進步曰境界違順當以初心對治曰子厚居栁築愚溪東坡居惠築鶴觀若將終身焉曰無我方能作為大事曰天將任之必大有所摧抑曰建立功名非知道者不能曰太剛恐易折須養以渾厚曰學必明心記問辨説皆餘事丞相張忠獻公浚帥閩知公居無屋耕無田嘗裒官之閒田千畝散屋百楹以遺公經輯生理公力辭不受强之不可其安貧自樂身雖詘而道益髙公遺藳有奏議三巻外制二巻議古三巻詩十巻雜文六巻公兄弟六人皆以儒業名節著聞於時長彌性嘗魁成均蚤亡次彌綸知台州次彌大歴河北河東宣撫副使大名尹刑部工部户部尚書將大用厄於權臣終老信州懐玉山次即公也次彌中為上舎優等未命而卒次彌正為吏部郎兼史館秦氏當國上書論事言所難言臺臣指為趙忠簡黨人坐廢二十年公議惜之公殁之日檜尚在相位時賢避其勢焰無敢狀公之行銘公之墓是以其事不傳無以聞於太史氏諸孤僅拾其遺事大概傳於家如立朝行已言行之可書者尚多所遺逸云
