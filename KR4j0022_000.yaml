body:
  text: 筠溪樂府詞曲類一詞集之屬提要臣等謹案筠溪樂府一卷宋李彌遜撰舊本附綴筠溪集末考彌遜家傳稱所撰奏議三卷外制二卷詩十卷雜文六卷與今本筠溪集合而不及樂府則此集本别行也凡長短調八十一首其長調多學蘇軾與栁周纎穠别為一派而力稍不足以舉之不及軾之操縱自如短調則不乏秀韻矣中多與李綱富知柔葉夢得張元幹唱和之作又有鵬舉座上歌姬唱夏雲峰一首考嶽飛字與湯邦彥皆字鵬舉皆與彌遜同時然飛於南渡初倥傯戎馬不應有聲伎之事或當為湯邦彥作與開卷寄張仲宗沁園春一首注蘆川集誤刋字然蝶戀花第五首今亦見蘆川集中又不知誰誤刋也自虞美人以下十二首皆祝夀之詞􅀈預通用一無可取宋人詞集往往不加刋削未喻其故今亦姑仍原本以存其舊焉乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:1043b5ab9abd2a8274fb90e652c7219d31a7678df689c9413f236f9f5b70f77e
